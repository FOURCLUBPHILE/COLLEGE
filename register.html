<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEMS - Register</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-md-5">
                
                <!-- Registration Card -->
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">Create Account</h3>
                        <p class="text-center text-muted mb-4">Join the College Event Management System</p>
                        
                        <!-- Registration Form -->
                        <!-- Note: We will create 'register.php' later to handle this data -->
                        <form action="register.php" method="POST">
                            
                            <div class="mb-3">
                                <label for="fullname" class="form-label">Full Name</label>
                                <input type="text" class="form-control" id="fullname" name="fullname" placeholder="e.g. Tarun Singh" required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                            </div>

                            <div class="mb-3">
                                <label for="role" class="form-label">Register As</label>
                                <select class="form-select" id="role" name="role" required>
                                    <option value="" selected disabled>Select Role</option>
                                    <option value="student">Student</option>
                                    <option value="coordinator">Coordinator</option>
                                </select>
                                <div class="form-text">Note: Admin accounts are created by the system administrator.</div>
                            </div>
                            
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success">Sign Up</button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <small>Already have an account? <a href="index.html">Login here</a></small>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
