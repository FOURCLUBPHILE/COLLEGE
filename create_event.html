<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create New Event</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
        <div class="container">
            <a class="navbar-brand" href="coordinator_dashboard.html">Coordinator Panel</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4>Create New Event</h4>
            </div>
            <div class="card-body">
                <!-- Form sends data to create_event.php -->
                <form action="create_event.php" method="POST">
                    
                    <div class="mb-3">
                        <label class="form-label">Event Title</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" name="date" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Venue</label>
                        <input type="text" class="form-control" name="venue" placeholder="e.g. Auditorium" required>
                    </div>

                    <!-- Hidden field: Status is always 'Pending' at first -->
                    <input type="hidden" name="status" value="Pending">

                    <button type="submit" class="btn btn-primary">Submit Event</button>
                    <a href="coordinator_dashboard.html" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
